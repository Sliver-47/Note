<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾光</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="拾光">
    <meta name="theme-color" content="#667eea">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-glass: rgba(255, 255, 255, 0.95);
            --text-primary: #1f2937;
            --border-color: rgba(255, 255, 255, 0.2);
        }

        .dark {
            --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --bg-glass: rgba(30, 30, 50, 0.95);
            --text-primary: #f3f4f6;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            transition: background 0.3s;
        }

        .glass {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .dark body { background: var(--bg-primary); }
        .dark .glass { background: var(--bg-glass); color: var(--text-primary); }
        .dark .text-gray-800 { color: #f3f4f6; }
        .dark .text-gray-700 { color: #e5e7eb; }
        .dark .text-gray-600 { color: #d1d5db; }
        .dark .text-gray-500 { color: #9ca3af; }
        .dark .bg-gray-50 { background-color: rgba(55, 65, 81, 0.5); }
        .dark .bg-gray-100 { background-color: rgba(75, 85, 99, 0.7); }
        .dark .border-gray-200 { border-color: rgba(255, 255, 255, 0.1); }
        .dark input, .dark textarea { background-color: rgba(55, 65, 81, 0.5); color: #f3f4f6; border-color: rgba(255, 255, 255, 0.1); }
        .dark input::placeholder, .dark textarea::placeholder { color: #9ca3af; }

        .note-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideIn 0.4s ease-out;
        }

        .note-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: scale(0.9); }
        }

        .deleting { animation: fadeOut 0.3s ease-out forwards; }

        .tag {
            display: inline-flex;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 2px;
        }

        .tag.inactive {
            opacity: 0.4;
            background: #9ca3af;
        }

        .empty-state {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .timestamp { font-family: 'JetBrains Mono', monospace; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- 头部 -->
        <header class="glass rounded-3xl p-6 mb-6 shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold">拾光</h1>
                        <p class="text-sm opacity-70" id="stats">共 0 条笔记</p>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button onclick="toggleTheme()" class="p-3 rounded-xl bg-gray-100 hover:bg-gray-200 transition-colors" title="切换主题">
                        <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                    </button>
                    <button onclick="exportNotes()" class="hidden md:flex items-center gap-2 px-4 py-3 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors font-medium">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        导出
                    </button>
                </div>
            </div>

            <!-- 搜索框 -->
            <div class="mt-4">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="搜索笔记或 #标签..."
                        class="w-full pl-10 pr-4 py-3 rounded-xl border-2 focus:border-indigo-500 focus:outline-none transition-all">
                    <svg class="w-5 h-5 absolute left-3 top-3.5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>

            <!-- 标签筛选 -->
            <div id="tagFilter" class="flex flex-wrap gap-2 mt-3"></div>
        </header>

        <!-- 新建笔记 -->
        <div class="glass rounded-3xl p-6 mb-6 shadow-xl">
            <input type="text" id="noteTitle" placeholder="标题（支持 #标签）..."
                class="w-full text-xl font-bold bg-transparent border-b-2 border-gray-200 focus:border-indigo-500 focus:outline-none py-2 px-1 transition-colors placeholder-gray-400 mb-4">

            <textarea id="noteContent" placeholder="写下你的想法..." rows="4"
                class="w-full rounded-xl p-4 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all leading-relaxed"></textarea>

            <div id="detectedTags" class="flex flex-wrap gap-1 mt-3 mb-4"></div>

            <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex gap-2">
                    <div id="previewBtn" class="hidden md:flex">
                        <button onclick="togglePreview()" class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 transition-colors text-sm">
                            预览
                        </button>
                    </div>
                    <button onclick="showTemplates()" class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 transition-colors text-sm">
                        模板
                    </button>
                </div>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button onclick="clearForm()" class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl border-2 border-gray-300 hover:bg-gray-50 font-medium transition-all">
                        清空
                    </button>
                    <button onclick="addNote()" class="flex-1 sm:flex-none px-8 py-2.5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl hover:shadow-lg hover:scale-105 transition-all font-medium">
                        保存
                    </button>
                </div>
            </div>

            <!-- 预览区域 -->
            <div id="previewArea" class="hidden mt-4 p-4 bg-gray-50 rounded-xl max-h-64 overflow-y-auto"></div>

            <!-- 模板选择 -->
            <div id="templateArea" class="hidden mt-4">
                <h3 class="font-bold mb-3">选择模板</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <button onclick="useTemplate('password')" class="p-4 border-2 border-gray-300 rounded-xl hover:bg-gray-50 transition-colors text-left">
                        <div class="font-bold flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                            密码记录
                        </div>
                        <p class="text-sm opacity-70 mt-1">记录账户密码信息</p>
                    </button>
                    <button onclick="useTemplate('note')" class="p-4 border-2 border-gray-300 rounded-xl hover:bg-gray-50 transition-colors text-left">
                        <div class="font-bold flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                            </svg>
                            普通笔记
                        </div>
                        <p class="text-sm opacity-70 mt-1">通用笔记模板</p>
                    </button>
                </div>
            </div>
        </div>

        <!-- 笔记列表 -->
        <div id="notesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

        <!-- 空状态 -->
        <div id="emptyState" class="hidden text-center py-20">
            <div class="empty-state inline-block">
                <svg class="w-32 h-32 mx-auto mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
            </div>
            <p class="text-lg opacity-50">还没有笔记，开始记录吧</p>
        </div>
    </div>

    <script>
        // 加密密钥（建议修改为你自己的密钥）
        const ENCRYPTION_KEY = 'your-secret-key';
        
        // 简单加密函数
        function encrypt(text, key) {
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return btoa(result);
        }
        
        // 简单解密函数
        function decrypt(encryptedText, key) {
            let text = atob(encryptedText);
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        }
        
        // 加载笔记（带解密）
        function loadNotes() {
            const encryptedNotes = localStorage.getItem('encryptedNotes');
            if (encryptedNotes) {
                try {
                    const decrypted = decrypt(encryptedNotes, ENCRYPTION_KEY);
                    return JSON.parse(decrypted);
                } catch (e) {
                    console.error('解密失败:', e);
                    return [];
                }
            }
            return [];
        }
        
        let notes = loadNotes();
        let editingId = null;
        let selectedTags = new Set();
        let isDark = localStorage.getItem('darkMode') === 'true';
        let showPreview = false;
        let syncCode = localStorage.getItem('syncCode') || generateSyncCode();

        function init() {
            if (isDark) document.body.classList.add('dark');
            updateStats();
            renderNotes();
            renderTagFilter();

            document.getElementById('searchInput').addEventListener('input', (e) => renderNotes(e.target.value));
            document.getElementById('noteTitle').addEventListener('input', detectTags);
            document.getElementById('noteContent').addEventListener('input', detectTags);

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') addNote();
            });
        }

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark);
        }

        function detectTags() {
            const title = document.getElementById('noteTitle').value;
            const content = document.getElementById('noteContent').value;
            const text = title + ' ' + content;
            const tagRegex = /#(\w+)/g;
            const tags = new Set();
            let match;

            while ((match = tagRegex.exec(text)) !== null) {
                tags.add(match[1]);
            }

            document.getElementById('detectedTags').innerHTML = Array.from(tags).map(t => `<span class="tag">#${t}</span>`).join('');
        }

        function getAllTags() {
            const tags = new Set();
            notes.forEach(note => {
                const tagRegex = /#(\w+)/g;
                let match;
                while ((match = tagRegex.exec(note.title + ' ' + note.content)) !== null) {
                    tags.add(match[1]);
                }
            });
            return tags;
        }

        function renderTagFilter() {
            const tags = getAllTags();
            const container = document.getElementById('tagFilter');

            if (tags.size === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = Array.from(tags).map(tag =>
                `<span class="tag ${selectedTags.has(tag) ? '' : 'inactive'}" onclick="toggleTag('${tag}')">#${tag}</span>`
            ).join('');
        }

        function toggleTag(tag) {
            if (selectedTags.has(tag)) {
                selectedTags.delete(tag);
            } else {
                selectedTags.add(tag);
            }
            renderTagFilter();
            renderNotes(document.getElementById('searchInput').value);
        }

        function togglePreview() {
            showPreview = !showPreview;
            const area = document.getElementById('previewArea');
            const btn = document.querySelector('#previewBtn button');

            if (showPreview) {
                area.classList.remove('hidden');
                btn.textContent = '关闭预览';
                updatePreview();
            } else {
                area.classList.add('hidden');
                btn.textContent = '预览';
            }
        }

        function showTemplates() {
            const area = document.getElementById('templateArea');
            const previewArea = document.getElementById('previewArea');
            
            if (area.classList.contains('hidden')) {
                area.classList.remove('hidden');
                previewArea.classList.add('hidden');
                showPreview = false;
                document.querySelector('#previewBtn button').textContent = '预览';
            } else {
                area.classList.add('hidden');
            }
        }

        function useTemplate(type) {
            const templates = {
                password: {
                    title: '密码记录 #密码',
                    content: `# 服务名称

- 用户名: 
- 密码提示: 
- 安全问题: 
- 备注: 
- 上次更新: ${new Date().toLocaleDateString('zh-CN')}
`
                },
                note: {
                    title: '笔记',
                    content: `# 标题

## 内容

`
                }
            };

            const template = templates[type];
            if (template) {
                document.getElementById('noteTitle').value = template.title;
                document.getElementById('noteContent').value = template.content;
                detectTags();
                document.getElementById('templateArea').classList.add('hidden');
                document.getElementById('noteTitle').focus();
            }
        }

        function updatePreview() {
            const content = document.getElementById('noteContent').value;
            let html = content
                .replace(/^# (.+)$/gm, '<h1 class="text-xl font-bold mt-4 mb-2">$1</h1>')
                .replace(/^## (.+)$/gm, '<h2 class="text-lg font-bold mt-3 mb-2">$1</h2>')
                .replace(/^### (.+)$/gm, '<h3 class="text-base font-bold mt-2 mb-1">$1</h3>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code class="bg-gray-200 px-1 rounded">$1</code>')
                .replace(/^- (.+)$/gm, '<li class="ml-4">$1</li>')
                .replace(/^> (.+)$/gm, '<blockquote class="border-l-4 border-indigo-500 pl-4 italic my-2">$1</blockquote>')
                .replace(/\n/g, '<br>');

            document.getElementById('previewArea').innerHTML = html;
        }

        function addNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();

            if (!title && !content) {
                alert('请输入标题或内容');
                return;
            }

            const note = {
                id: editingId || Date.now(),
                title: title || '无标题',
                content: content,
                timestamp: new Date().toISOString()
            };

            if (editingId) {
                const index = notes.findIndex(n => n.id === editingId);
                if (index !== -1) notes[index] = note;
                editingId = null;
            } else {
                notes.unshift(note);
            }

            saveNotes();
            clearForm();
            updateStats();
            renderNotes();
            renderTagFilter();
        }

        function renderNotes(searchTerm = '') {
            const container = document.getElementById('notesContainer');
            const emptyState = document.getElementById('emptyState');

            let filtered = notes.filter(note => {
                const term = searchTerm.toLowerCase().replace('#', '');
                const matchSearch = !term ||
                    note.title.toLowerCase().includes(term) ||
                    note.content.toLowerCase().includes(term);

                const matchTags = selectedTags.size === 0 ||
                    Array.from(selectedTags).every(tag =>
                        note.title.includes(`#${tag}`) || note.content.includes(`#${tag}`)
                    );

                return matchSearch && matchTags;
            });

            if (filtered.length === 0 && notes.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 opacity-50">没有找到匹配的笔记</div>`;
                emptyState.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.innerHTML = filtered.map(note => {
                const tagRegex = /#(\w+)/g;
                const tags = [];
                let match;
                while ((match = tagRegex.exec(note.title + ' ' + note.content)) !== null) {
                    if (!tags.includes(match[1])) tags.push(match[1]);
                }

                const preview = note.content.length > 80 ? note.content.substring(0, 80) + '...' : note.content;

                return `
                    <div class="note-card glass rounded-2xl p-5 cursor-pointer" onclick="editNote(${note.id})">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="font-bold text-lg line-clamp-2 flex-1">${escapeHtml(note.title)}</h3>
                            <button onclick="event.stopPropagation(); deleteNote(${note.id})"
                                    class="p-1.5 hover:bg-red-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100">
                                <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3"></path>
                                </svg>
                            </button>
                        </div>
                        <p class="text-sm opacity-70 mb-3 line-clamp-3">${escapeHtml(preview)}</p>
                        ${tags.length > 0 ? `<div class="flex flex-wrap gap-1 mb-3">${tags.slice(0, 3).map(t => `<span class="tag text-xs">#${t}</span>`).join('')}</div>` : ''}
                        <div class="flex justify-between items-center pt-3 border-t border-gray-200/50">
                            <span class="timestamp text-xs opacity-50">${formatTime(note.timestamp)}</span>
                            <span class="text-xs opacity-50">${note.content.length} 字</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function editNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;

            document.getElementById('noteTitle').value = note.title;
            document.getElementById('noteContent').value = note.content;
            editingId = id;
            detectTags();
            document.getElementById('noteTitle').focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteNote(id) {
            if (!confirm('确定要删除这条笔记吗？')) return;
            notes = notes.filter(n => n.id !== id);
            saveNotes();
            updateStats();
            renderNotes();
            renderTagFilter();
        }

        function clearForm() {
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            document.getElementById('detectedTags').innerHTML = '';
            editingId = null;
            if (showPreview) {
                document.getElementById('previewArea').innerHTML = '';
            }
        }

        function saveNotes() {
            const encrypted = encrypt(JSON.stringify(notes), ENCRYPTION_KEY);
            localStorage.setItem('encryptedNotes', encrypted);
        }

        function updateStats() {
            const total = notes.length;
            const totalChars = notes.reduce((sum, note) => sum + note.content.length, 0);
            document.getElementById('stats').textContent = `共 ${total} 条笔记 · ${totalChars} 字`;
        }

        function exportNotes() {
            if (notes.length === 0) {
                alert('没有笔记可导出');
                return;
            }
            const dataStr = JSON.stringify(notes, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `notes_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)} 天前`;

            return date.toLocaleDateString('zh-CN');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
