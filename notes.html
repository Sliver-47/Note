<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾光</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="拾光">
    <meta name="theme-color" content="#667eea">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .note-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideIn 0.4s ease-out;
        }
        
        .note-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: scale(0.9);
            }
        }
        
        .deleting {
            animation: fadeOut 0.3s ease-out forwards;
        }
        
        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        
        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
            border: 3px solid transparent;
        }
        
        .color-dot:hover {
            transform: scale(1.2);
        }
        
        .color-dot.active {
            border-color: #4f46e5;
            transform: scale(1.1);
        }
        
        .empty-state {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .timestamp {
            font-family: 'JetBrains Mono', monospace;
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- 头部 -->
        <header class="glass rounded-3xl p-6 mb-6 shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">拾光</h1>
                        <p class="text-sm text-gray-500" id="stats">加载中...</p>
                    </div>
                </div>
                
                <div class="flex gap-3 w-full md:w-auto">
                    <div class="relative flex-1 md:w-64">
                        <input type="text" id="searchInput" placeholder="搜索笔记..."
                            class="search-input w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-500 focus:outline-none transition-all bg-gray-50">
                        <svg class="w-5 h-5 text-gray-400 absolute left-3 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <button onclick="exportNotes()" class="hidden md:flex items-center gap-2 px-4 py-3 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors text-gray-700 font-medium">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        导出
                    </button>
                </div>
            </div>
        </header>

        <!-- 新建笔记区域 -->
        <div class="glass rounded-3xl p-6 mb-6 shadow-xl">
            <div class="mb-4">
                <input type="text" id="noteTitle" placeholder="标题..."
                    class="w-full text-xl font-bold bg-transparent border-b-2 border-gray-200 focus:border-indigo-500 focus:outline-none py-2 px-1 transition-colors placeholder-gray-400">
            </div>
            <textarea id="noteContent" placeholder="写下你的想法..." rows="4"
                class="w-full bg-gray-50 rounded-xl p-4 resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-gray-700 leading-relaxed"></textarea>

            <div class="flex flex-col sm:flex-row justify-between items-center mt-4 gap-4">
                <div class="flex gap-2">
                    <div class="color-dot bg-white border-2 border-gray-300 active" data-color="white" onclick="selectColor(this)"></div>
                    <div class="color-dot bg-yellow-100" data-color="yellow" onclick="selectColor(this)"></div>
                    <div class="color-dot bg-green-100" data-color="green" onclick="selectColor(this)"></div>
                    <div class="color-dot bg-blue-100" data-color="blue" onclick="selectColor(this)"></div>
                    <div class="color-dot bg-purple-100" data-color="purple" onclick="selectColor(this)"></div>
                    <div class="color-dot bg-pink-100" data-color="pink" onclick="selectColor(this)"></div>
                </div>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button onclick="clearForm()" class="flex-1 sm:flex-none px-6 py-2.5 rounded-xl border-2 border-gray-300 text-gray-600 hover:bg-gray-50 font-medium transition-all">
                        清空
                    </button>
                    <button onclick="addNote()" class="flex-1 sm:flex-none px-8 py-2.5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl hover:shadow-lg hover:scale-105 transition-all font-medium flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        添加笔记
                    </button>
                </div>
            </div>
        </div>

        <!-- 笔记列表 -->
        <div id="notesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- 笔记卡片将在这里动态生成 -->
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="hidden text-center py-20">
            <div class="empty-state inline-block">
                <svg class="w-32 h-32 text-indigo-200 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
            </div>
            <p class="text-gray-500 text-lg">还没有笔记，开始记录第一条吧！</p>
        </div>
    </div>

    <script>
        // 数据存储
        let notes = JSON.parse(localStorage.getItem('myNotes')) || [];
        let selectedColor = 'white';
        let editingId = null;

        // 颜色映射
        const colorMap = {
            'white': 'bg-white',
            'yellow': 'bg-yellow-50 border-yellow-200',
            'green': 'bg-green-50 border-green-200',
            'blue': 'bg-blue-50 border-blue-200',
            'purple': 'bg-purple-50 border-purple-200',
            'pink': 'bg-pink-50 border-pink-200'
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderNotes();
            updateStats();

            // 搜索功能
            document.getElementById('searchInput').addEventListener('input', (e) => {
                renderNotes(e.target.value);
            });

            // 快捷键支持
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    addNote();
                }
            });
        });

        // 选择颜色
        function selectColor(element) {
            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
            element.classList.add('active');
            selectedColor = element.dataset.color;
        }

        // 添加/更新笔记
        function addNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();

            if (!title && !content) {
                shakeElement(document.querySelector('.glass'));
                return;
            }

            const note = {
                id: editingId || Date.now(),
                title: title || '无标题',
                content: content,
                color: selectedColor,
                timestamp: new Date().toISOString()
            };

            if (editingId) {
                const index = notes.findIndex(n => n.id === editingId);
                if (index !== -1) notes[index] = note;
                editingId = null;
            } else {
                notes.unshift(note);
            }

            saveNotes();
            clearForm();
            renderNotes();
            updateStats();
        }

        // 渲染笔记列表
        function renderNotes(searchTerm = '') {
            const container = document.getElementById('notesContainer');
            const emptyState = document.getElementById('emptyState');

            const filteredNotes = notes.filter(note => {
                const term = searchTerm.toLowerCase();
                return note.title.toLowerCase().includes(term) ||
                       note.content.toLowerCase().includes(term);
            });

            if (filteredNotes.length === 0 && notes.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            if (filteredNotes.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-400">
                        没有找到匹配的笔记
                    </div>
                `;
                emptyState.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.innerHTML = filteredNotes.map(note => `
                <div class="note-card glass rounded-2xl p-5 ${colorMap[note.color]} border-2 relative group" id="note-${note.id}">
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="font-bold text-lg text-gray-800 line-clamp-2 flex-1 mr-2">${escapeHtml(note.title)}</h3>
                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="editNote(${note.id})" class="p-1.5 hover:bg-black/5 rounded-lg transition-colors text-gray-600" title="编辑">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                </svg>
                            </button>
                            <button onclick="deleteNote(${note.id})" class="p-1.5 hover:bg-red-50 hover:text-red-600 rounded-lg transition-colors text-gray-600" title="删除">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <p class="text-gray-600 text-sm leading-relaxed mb-4 whitespace-pre-wrap line-clamp-4">${escapeHtml(note.content)}</p>
                    <div class="flex justify-between items-center pt-3 border-t border-gray-200/50">
                        <span class="timestamp text-xs text-gray-400">${formatTime(note.timestamp)}</span>
                        <span class="text-xs text-gray-400">${note.content.length} 字</span>
                    </div>
                </div>
            `).join('');
        }

        // 编辑笔记
        function editNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;

            document.getElementById('noteTitle').value = note.title === '无标题' ? '' : note.title;
            document.getElementById('noteContent').value = note.content;

            // 设置颜色
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.classList.remove('active');
                if (dot.dataset.color === note.color) {
                    dot.classList.add('active');
                    selectedColor = note.color;
                }
            });

            editingId = id;

            // 滚动到顶部
            document.querySelector('.glass').scrollIntoView({ behavior: 'smooth', block: 'center' });

            // 视觉反馈
            document.getElementById('noteTitle').focus();
        }

        // 删除笔记
        function deleteNote(id) {
            if (!confirm('确定要删除这条笔记吗？')) return;

            const element = document.getElementById(`note-${id}`);
            element.classList.add('deleting');

            setTimeout(() => {
                notes = notes.filter(n => n.id !== id);
                saveNotes();
                renderNotes(document.getElementById('searchInput').value);
                updateStats();
            }, 300);
        }

        // 清空表单
        function clearForm() {
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            editingId = null;

            // 重置颜色选择
            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
            document.querySelector('[data-color="white"]').classList.add('active');
            selectedColor = 'white';
        }

        // 保存到本地存储
        function saveNotes() {
            localStorage.setItem('myNotes', JSON.stringify(notes));
        }

        // 更新统计
        function updateStats() {
            const total = notes.length;
            const totalChars = notes.reduce((sum, note) => sum + note.content.length, 0);
            document.getElementById('stats').textContent = `共 ${total} 条笔记 · ${totalChars} 字`;
        }

        // 导出笔记
        function exportNotes() {
            if (notes.length === 0) {
                alert('没有笔记可导出');
                return;
            }

            const dataStr = JSON.stringify(notes, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `notes_backup_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        // 格式化时间
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)} 天前`;

            return date.toLocaleDateString('zh-CN');
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 抖动动画
        function shakeElement(element) {
            element.style.animation = 'shake 0.5s';
            setTimeout(() => {
                element.style.animation = '';
            }, 500);
        }

        // 添加抖动动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
