<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>拾光</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="拾光">
    <meta name="theme-color" content="#667eea">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-glass: rgba(255, 255, 255, 0.95);
            --text-primary: #1f2937;
            --border-color: rgba(255, 255, 255, 0.2);
        }

        .dark {
            --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --bg-glass: rgba(30, 30, 50, 0.95);
            --text-primary: #f3f4f6;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            transition: background 0.3s;
            -webkit-tap-highlight-color: transparent;
            /* 适配刘海屏 */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* 触摸目标增大 */
        .touch-target {
            min-height: 44px;
            min-width: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* 工具栏按钮适配 */
        .toolbar-btn {
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
        }

        /* 移动端优化 */
        @media (max-width: 390px) {
            .glass {
                border-radius: 16px !important;
            }
            
            /* 工具栏按钮分组 */
            .toolbar-group {
                display: flex;
                gap: 4px;
            }
            
            /* 编辑器适配 */
            #noteTitle {
                font-size: 18px !important;
                padding: 12px !important;
            }
            
            #noteContent {
                font-size: 16px !important;
                line-height: 1.6 !important;
            }
        }

        /* 适配小米13等高密度屏幕 */
        @media (min-resolution: 300dpi) {
            body {
                font-size: 16px;
            }
            
            .glass {
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            }
        }

        .glass {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            transition: all 0.3s;
        }

        /* 占位符颜色区分 */
        #noteTitle::placeholder {
            color: #666;
            opacity: 1;
        }

        #noteContent:empty::before {
            content: attr(data-placeholder);
            color: #999;
            pointer-events: none;
        }

        body.dark { background: var(--bg-primary); }
        .dark .glass { background: var(--bg-glass); color: var(--text-primary); }
        .dark .text-gray-800 { color: #f3f4f6; }
        .dark #noteTitle::placeholder { color: #aaa; }
        .dark #noteContent:empty::before { color: #888; }
        .dark .text-gray-700 { color: #e5e7eb; }
        .dark .text-gray-600 { color: #d1d5db; }
        .dark .text-gray-500 { color: #9ca3af; }
        .dark .bg-gray-50 { background-color: rgba(55, 65, 81, 0.5); }
        .dark .bg-gray-100 { background-color: rgba(75, 85, 99, 0.7); }
        .dark .border-gray-200 { border-color: rgba(255, 255, 255, 0.1); }
        .dark input, .dark textarea { background-color: rgba(55, 65, 81, 0.5); color: #f3f4f6; border-color: rgba(255, 255, 255, 0.1); }
        .dark input::placeholder, .dark textarea::placeholder { color: #9ca3af; }

        .note-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideIn 0.4s ease-out;
        }

        .note-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: scale(0.9); }
        }

        .deleting { animation: fadeOut 0.3s ease-out forwards; }

        .tag {
            display: inline-flex;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 2px;
        }

        .tag.inactive {
            opacity: 0.4;
            background: #9ca3af;
        }

        .empty-state {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .timestamp { font-family: 'JetBrains Mono', monospace; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }

        /* Markdown 预览样式 */
        #previewArea h1 { font-size: 2em; font-weight: bold; margin: 0.5em 0; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.3em; }
        #previewArea h2 { font-size: 1.5em; font-weight: bold; margin: 0.5em 0; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.3em; }
        #previewArea h3 { font-size: 1.25em; font-weight: bold; margin: 0.5em 0; }
        #previewArea h4 { font-size: 1em; font-weight: bold; margin: 0.5em 0; }
        #previewArea p { margin: 0.8em 0; line-height: 1.6; }
        #previewArea ul, #previewArea ol { margin: 0.8em 0; padding-left: 2em; }
        #previewArea li { margin: 0.3em 0; }
        #previewArea code { background: #f3f4f6; padding: 0.2em 0.4em; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }
        #previewArea pre { background: #f3f4f6; padding: 1em; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
        #previewArea pre code { background: none; padding: 0; }
        #previewArea blockquote { border-left: 4px solid #667eea; padding-left: 1em; margin: 1em 0; color: #6b7280; }
        #previewArea a { color: #667eea; text-decoration: underline; }
        #previewArea img { max-width: 100%; border-radius: 8px; margin: 0.5em 0; }
        #previewArea hr { border: none; border-top: 1px solid #e5e7eb; margin: 1.5em 0; }
        #previewArea table { border-collapse: collapse; width: 100%; margin: 1em 0; }
        #previewArea th, #previewArea td { border: 1px solid #e5e7eb; padding: 0.5em 1em; text-align: left; }
        #previewArea th { background: #f3f4f6; font-weight: bold; }
        .dark #previewArea h1, .dark #previewArea h2, .dark #previewArea h3, .dark #previewArea h4 { border-color: #4b5563; }
        .dark #previewArea code { background: #374151; }
        .dark #previewArea pre { background: #374151; }
        .dark #previewArea blockquote { color: #9ca3af; }
        .dark #previewArea th, .dark #previewArea td { border-color: #4b5563; }
        .dark #previewArea th { background: #374151; }

        /* Markdown 编辑器样式 */
        #noteContent.markdown-source { font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.6; }
        #noteContent.markdown-source * { white-space: pre-wrap; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <!-- 移动端菜单按钮 -->
    <button id="mobileMenuBtn" class="md:hidden fixed top-4 left-4 z-50 p-3 bg-white dark:bg-gray-800 rounded-xl shadow-lg" onclick="toggleMobileSidebar()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
    </button>

    <!-- 移动端侧边栏遮罩 -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden" onclick="closeMobileSidebar()"></div>

    <div class="flex flex-col md:flex-row gap-6">
        <!-- 左侧笔记列表 - 移动端为抽屉 -->
        <div id="sidebar" class="w-full md:w-80 flex-shrink-0 fixed md:relative inset-y-0 left-0 z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 bg-white md:bg-transparent dark:bg-gray-900 md:dark:bg-transparent pt-16 md:pt-0 px-4 md:px-0 overflow-y-auto h-full md:h-auto">
            <!-- 头部 -->
            <div class="glass rounded-3xl p-6 mb-6 shadow-2xl">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold">拾光</h1>
                        <p class="text-sm opacity-70" id="stats">共 0 条笔记</p>
                    </div>
                </div>

                <div class="flex gap-2 mb-4">
                    <button onclick="toggleTheme()" class="touch-target rounded-xl bg-gray-100 hover:bg-gray-200 transition-colors" title="切换主题">
                        <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                    </button>
                    <button onclick="toggleBackgroundSettings()" class="touch-target rounded-xl bg-gray-100 hover:bg-gray-200 transition-colors" title="设置背景">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                    </button>
                    <button onclick="toggleBackupManager()" class="touch-target rounded-xl bg-gray-100 hover:bg-gray-200 transition-colors" title="备份管理">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                    </button>
                </div>

                <!-- 背景设置面板 -->
                <div id="backgroundSettings" class="hidden mt-4 p-4 bg-gray-100 rounded-xl">
                    <h3 class="font-bold mb-3">背景设置</h3>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="aspect-square rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 cursor-pointer hover:ring-2 hover:ring-indigo-500" onclick="setBackground('gradient')"></div>
                        <div class="aspect-square rounded-lg bg-cover bg-center" style="background-image: url('https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=soft%20blue%20abstract%20background&image_size=landscape_16_9')" onclick="setBackground('https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=soft%20blue%20abstract%20background&image_size=landscape_16_9')"></div>
                        <div class="aspect-square rounded-lg bg-cover bg-center" style="background-image: url('https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=warm%20orange%20sunset%20background&image_size=landscape_16_9')" onclick="setBackground('https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=warm%20orange%20sunset%20background&image_size=landscape_16_9')"></div>
                        <div class="aspect-square rounded-lg bg-cover bg-center" style="background-image: url('https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=green%20nature%20forest%20background&image_size=landscape_16_9')" onclick="setBackground('https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=green%20nature%20forest%20background&image_size=landscape_16_9')"></div>
                        <div class="aspect-square rounded-lg bg-cover bg-center" style="background-image: url('https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=purple%20night%20sky%20background&image_size=landscape_16_9')" onclick="setBackground('https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=purple%20night%20sky%20background&image_size=landscape_16_9')"></div>
                        <div class="aspect-square rounded-lg border-2 border-dashed border-gray-400 flex items-center justify-center cursor-pointer hover:border-indigo-500" onclick="uploadBackground()">
                            <svg class="w-6 h-6 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                    </div>

                    <!-- 图片插入 -->
                    <div class="relative flex-shrink-0">
                        <button onclick="document.getElementById('imageInput').click()" class="p-1.5 hover:bg-gray-200 rounded transition-colors" title="插入图片">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                        </button>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                </div>

                <!-- 备份管理面板 -->
                <div id="backupManager" class="hidden mt-4 p-4 bg-gray-100 rounded-xl">
                    <h3 class="font-bold mb-3">备份管理</h3>
                    
                    <!-- 备份状态 -->
                    <div class="mb-4 p-3 bg-white rounded-lg">
                        <h4 class="font-medium mb-2">备份状态</h4>
                        <div class="space-y-2">
                            <div class="flex justify-between items-center">
                                <span>本地文件备份</span>
                                <span id="backupStatus" class="text-sm">未设置</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span>IndexedDB快照</span>
                                <span id="snapshotStatus" class="text-sm">未创建</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span>存储使用情况</span>
                                <span id="storageStatus" class="text-sm">计算中...</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 历史版本 -->
                    <div class="mb-4">
                        <div class="flex justify-between items-center mb-2">
                            <h4 class="font-medium">历史版本</h4>
                            <button onclick="loadSnapshots()" class="text-sm text-blue-600 hover:underline">刷新</button>
                        </div>
                        <div id="snapshotsList" class="bg-white rounded-lg p-3 max-h-48 overflow-y-auto">
                            <p class="text-gray-500 text-sm">点击刷新查看历史版本</p>
                        </div>
                    </div>
                    
                    <!-- 操作按钮 -->
                    <div class="flex gap-2">
                        <button onclick="setupLocalBackup()" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                            设置本地备份
                        </button>
                        <button onclick="createSnapshot()" class="flex-1 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                            创建快照
                        </button>
                        <button onclick="exportNotes()" class="flex-1 px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors">
                            导出备份
                        </button>
                        <button onclick="exportEncryptionKey()" class="flex-1 px-4 py-2 bg-amber-600 text-white rounded-lg hover:bg-amber-700 transition-colors">
                            导出密钥
                        </button>
                    </div>
                </div>

                <!-- 搜索功能 -->
                <div class="mt-4">
                    <div class="relative">
                        <input type="text" id="searchInput" placeholder="搜索笔记或 #标签..."
                            class="w-full pl-10 pr-4 py-3 rounded-xl border-2 focus:border-indigo-500 focus:outline-none transition-all">
                        <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <!-- 排序选项 -->
                    <div class="flex items-center justify-between mt-2">
                        <label class="text-sm text-gray-500">排序：</label>
                        <select id="sortOption" class="text-sm border border-gray-300 rounded-lg px-2 py-1 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                            <option value="recent">最近修改优先</option>
                            <option value="relevance">相关性优先</option>
                        </select>
                    </div>
                </div>

                <!-- 文件夹管理 -->
                <div class="mt-4">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold">文件夹</h3>
                        <!-- 新建下拉菜单 -->
                        <div class="relative">
                            <button id="newNoteBtn" class="flex items-center gap-1 px-3 py-1.5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-lg hover:shadow-lg transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                                </svg>
                                新建
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </button>
                            <div id="newNoteMenu" class="hidden absolute right-0 top-full mt-1 w-48 bg-white dark:bg-gray-800 shadow-xl rounded-lg z-50 p-2 border border-gray-200 dark:border-gray-700">
                                <div class="flex flex-col gap-2 p-2">
                                    <button onclick="newBlankNote()" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors w-full">
                                        <div class="w-8 h-8 bg-gray-100 dark:bg-gray-700 rounded-lg flex items-center justify-center">
                                            <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                            </svg>
                                        </div>
                                        <span class="text-sm font-medium">空白文档</span>
                                    </button>
                                    <button onclick="addFolder()" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors w-full">
                                        <div class="w-8 h-8 bg-gray-100 dark:bg-gray-700 rounded-lg flex items-center justify-center">
                                            <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                                            </svg>
                                        </div>
                                        <span class="text-sm font-medium">文件夹</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="foldersContainer" class="space-y-1"></div>
                </div>

                <!-- 标签筛选 -->
                <div id="tagFilter" class="flex flex-wrap gap-2 mt-3"></div>
            </div>

            <!-- 笔记列表 -->
            <div class="glass rounded-3xl p-4 h-[calc(100vh-320px)] overflow-y-auto shadow-xl">
                <!-- 空状态 -->
                <div id="emptyState" class="hidden text-center py-16">
                    <div class="empty-state inline-block">
                        <div class="w-32 h-32 mx-auto mb-8 bg-gradient-to-br from-indigo-100 to-purple-100 rounded-full flex items-center justify-center shadow-lg">
                            <svg class="w-16 h-16 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                            </svg>
                        </div>

    <script>
        // 加密相关函数
        async function generateKey() {
            try {
                const key = await crypto.subtle.generateKey(
                    {
                        name: 'AES-GCM',
                        length: 256
                    },
                    true,
                    ['encrypt', 'decrypt']
                );
                const exportedKey = await crypto.subtle.exportKey('raw', key);
                return btoa(String.fromCharCode(...new Uint8Array(exportedKey)));
            } catch (e) {
                console.error('生成密钥失败:', e);
                throw e;
            }
        }

        async function getKey() {
            let keyStr = localStorage.getItem('encryptionKey');
            if (!keyStr) {
                keyStr = await generateKey();
                localStorage.setItem('encryptionKey', keyStr);
            }
            const keyBytes = new Uint8Array([...atob(keyStr)].map(c => c.charCodeAt(0)));
            return await crypto.subtle.importKey(
                'raw',
                keyBytes,
                { name: 'AES-GCM' },
                false,
                ['encrypt', 'decrypt']
            );
        }

        async function encryptData(data) {
            const key = await getKey();
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encoder = new TextEncoder();
            const encodedData = encoder.encode(JSON.stringify(data));
            const encrypted = await crypto.subtle.encrypt(
                {
                    name: 'AES-GCM',
                    iv: iv
                },
                key,
                encodedData
            );
            const encryptedBytes = new Uint8Array(encrypted);
            const combined = new Uint8Array(iv.length + encryptedBytes.length);
            combined.set(iv, 0);
            combined.set(encryptedBytes, iv.length);
            return btoa(String.fromCharCode(...combined));
        }

        async function decryptData(encryptedData) {
            const key = await getKey();
            const combined = new Uint8Array([...atob(encryptedData)].map(c => c.charCodeAt(0)));
            const iv = combined.slice(0, 12);
            const encryptedBytes = combined.slice(12);
            const decrypted = await crypto.subtle.decrypt(
                {
                    name: 'AES-GCM',
                    iv: iv
                },
                key,
                encryptedBytes
            );
            const decoder = new TextDecoder();
            return JSON.parse(decoder.decode(decrypted));
        }

        // 简单解密函数（用于数据迁移）
        function oldDecrypt(encryptedText, key) {
            let text = atob(encryptedText);
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        }

        // 加载笔记
        async function loadNotes() {
            // 尝试从加密存储读取
            const encryptedNotes = localStorage.getItem('encryptedNotes');
            if (encryptedNotes) {
                try {
                    const loadedNotes = await decryptData(encryptedNotes);
                    // 数据验证和修复：确保每条笔记都有必需字段，且id为字符串类型
                    const validatedNotes = loadedNotes.map(note => ({
                        id: String(note.id || Date.now().toString()),
                        title: note.title || '无标题',
                        content: note.content || '',
                        timestamp: note.timestamp || new Date().toISOString(),
                        pinned: note.pinned || false,
                        starred: note.starred || false,
                        folder: note.folder || 'default',
                        tags: note.tags || []
                    }));
                    // 评估存储情况
                    setTimeout(assessStorage, 1000);
                    return validatedNotes;
                } catch (e) {
                    console.error('解密失败:', e);
                    return [];
                }
            }
            
            // 尝试从旧的加密存储迁移数据
            const oldEncryptedNotes = localStorage.getItem('oldEncryptedNotes');
            if (oldEncryptedNotes) {
                try {
                    const oldKey = 'your-secret-key';
                    const decrypted = oldDecrypt(oldEncryptedNotes, oldKey);
                    const oldNotes = JSON.parse(decrypted);
                    // 迁移到新的加密存储
                    await saveNotes(oldNotes);
                    // 清理旧数据
                    localStorage.removeItem('oldEncryptedNotes');
                    // 评估存储情况
                    setTimeout(assessStorage, 1000);
                    return oldNotes;
                } catch (e) {
                    console.error('迁移失败:', e);
                    return [];
                }
            }
            
            // 尝试从非加密存储迁移数据
            const unencryptedNotes = localStorage.getItem('notes');
            if (unencryptedNotes) {
                try {
                    const oldNotes = JSON.parse(unencryptedNotes);
                    // 迁移到新的加密存储
                    await saveNotes(oldNotes);
                    // 清理旧数据
                    localStorage.removeItem('notes');
                    // 评估存储情况
                    setTimeout(assessStorage, 1000);
                    return oldNotes;
                } catch (e) {
                    console.error('迁移失败:', e);
                    return [];
                }
            }
            
            return [];
        }

        // 快照相关变量
        let saveCount = 0;
        let lastSnapshotTime = 0;
        const MAX_COMPLETE_SNAPSHOTS = 3;
        const MAX_SNAPSHOTS = 10;
        
        // 初始化IndexedDB
        function initIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('NoteAppSnapshots', 2);
                
                request.onerror = () => reject('IndexedDB初始化失败');
                
                request.onsuccess = () => resolve(request.result);
                
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('snapshots')) {
                        db.createObjectStore('snapshots', { keyPath: 'id', autoIncrement: true });
                    }
                    if (!db.objectStoreNames.contains('images')) {
                        const imageStore = db.createObjectStore('images', { keyPath: 'id', autoIncrement: true });
                        imageStore.createIndex('noteId', 'noteId', { unique: false });
                    }
                };
            });
        }
        
        // 创建快照
        async function createSnapshot() {
            try {
                const db = await initIndexedDB();
                const transaction = db.transaction('snapshots', 'readwrite');
                const store = transaction.objectStore('snapshots');
                
                // 获取当前笔记数据
                const snapshotData = {
                    timestamp: new Date().toISOString(),
                    notes: notes,
                    folders: folders,
                    version: 1,
                    type: 'complete' // 完整快照
                };
                
                // 添加新快照
                await store.add(snapshotData);
                
                // 获取所有快照
                const snapshots = await store.getAll();
                
                // 按时间排序（最新的在前）
                snapshots.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                // 只保留最近3个完整快照，更早的转换为元数据快照
                if (snapshots.length > MAX_COMPLETE_SNAPSHOTS) {
                    for (let i = MAX_COMPLETE_SNAPSHOTS; i < snapshots.length; i++) {
                        const snapshot = snapshots[i];
                        if (snapshot.type === 'complete') {
                            // 转换为元数据快照
                            const metadataSnapshot = {
                                id: snapshot.id,
                                timestamp: snapshot.timestamp,
                                noteCount: snapshot.notes.length,
                                folderCount: snapshot.folders.length,
                                version: 1,
                                type: 'metadata' // 元数据快照
                            };
                            await store.put(metadataSnapshot);
                        }
                    }
                }
                
                // 如果快照数量超过最大值，删除最旧的
                if (snapshots.length > MAX_SNAPSHOTS) {
                    snapshots.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                    const toDelete = snapshots.slice(0, snapshots.length - MAX_SNAPSHOTS);
                    
                    for (const snapshot of toDelete) {
                        await store.delete(snapshot.id);
                    }
                }
                
                console.log('快照创建成功');
            } catch (error) {
                console.error('创建快照失败:', error);
            }
        }

        // 检查是否需要执行本地备份
        function checkLocalBackupNeeded() {
            if (backupFrequency === 'manual') {
                return;
            }
            
            const now = new Date();
            const lastBackup = new Date(lastBackupDate);
            
            switch (backupFrequency) {
                case 'daily':
                    // 每天备份
                    if (now.toDateString() !== lastBackup.toDateString()) {
                        performLocalBackup();
                    }
                    break;
                case 'weekly':
                    // 每周备份
                    const weekDiff = Math.floor((now - lastBackup) / (7 * 24 * 60 * 60 * 1000));
                    if (weekDiff >= 1) {
                        performLocalBackup();
                    }
                    break;
                case 'monthly':
                    // 每月备份
                    const monthDiff = (now.getFullYear() - lastBackup.getFullYear()) * 12 + 
                                     (now.getMonth() - lastBackup.getMonth());
                    if (monthDiff >= 1) {
                        performLocalBackup();
                    }
                    break;
            }
        }

        // 存储迁移评估
        async function assessStorage() {
            try {
                // 计算localStorage使用情况
                const localStorageSize = calculateLocalStorageSize();
                console.log(`localStorage使用情况: ${(localStorageSize / 1024 / 1024).toFixed(2)} MB`);
                
                // 检查是否有大量图片
                const imageDataSize = calculateImageDataSize();
                console.log(`图片数据大小: ${(imageDataSize / 1024 / 1024).toFixed(2)} MB`);
                
                // 评估是否需要迁移
                if (localStorageSize > 4 * 1024 * 1024) { // 超过4MB
                    console.log('localStorage容量接近上限，建议迁移图片数据');
                    if (imageDataSize > 1 * 1024 * 1024) { // 图片超过1MB

        // 计算localStorage使用情况
        function calculateLocalStorageSize() {
            let totalSize = 0;
            for (const key in localStorage) {
                if (localStorage.hasOwnProperty(key)) {
                    totalSize += key.length + localStorage[key].length;
                }
            }
            return totalSize;
        }
        
        // 计算图片数据大小
        function calculateImageDataSize() {
            let totalSize = 0;
            notes.forEach(note => {
                // 查找Base64图片数据
                const base64Images = note.content.match(/data:image\/[^;]+;base64,[^"']+/g) || [];
                base64Images.forEach(image => {
                    // Base64编码的图片大小大约是原始大小的1.37倍
                    totalSize += image.length * 0.73;
                });
            });
            return totalSize;
        }
        
        // 建议图片迁移
        async function suggestImageMigration() {
            if (confirm('检测到您的笔记中包含大量图片数据，可能会占用较多localStorage空间。\n\n是否将图片数据迁移到IndexedDB存储以节省空间？')) {
                await migrateImagesToIndexedDB();
            }
        }
        
        // 将图片迁移到IndexedDB
        async function migrateImagesToIndexedDB() {
            try {
                const db = await initIndexedDB();
                
                // 处理每个笔记
                for (const note of notes) {
                    let updatedContent = note.content;
                    const base64Images = note.content.match(/data:image\/[^;]+;base64,[^"']+/g) || [];
                    
                    for (const imageData of base64Images) {
                        // 生成唯一ID
                        const imageId = Date.now().toString() + Math.random().toString(36).substr(2, 9);
                        
                        // 存储图片到IndexedDB
                        const transaction = db.transaction('images', 'readwrite');
                        const imageStore = transaction.objectStore('images');
                        await imageStore.add({
                            id: imageId,
                            noteId: note.id,
                            data: imageData,
                            timestamp: new Date().toISOString()
                        });
                        
                        // 替换笔记中的图片数据为引用
                        updatedContent = updatedContent.replace(imageData, `[image:${imageId}]`);
                    }
                    
                    if (updatedContent !== note.content) {
                        note.content = updatedContent;
                    }
                }
                
                // 保存更新后的笔记
                await saveNotes();
                console.log('图片迁移成功');
            } catch (error) {
                console.error('图片迁移失败:', error);
            }
        }
        
        // 从IndexedDB加载图片
        async function loadImagesForNote(note) {
            try {
                const db = await initIndexedDB();
                const transaction = db.transaction('images', 'readonly');
                const imageStore = transaction.objectStore('images');
                
                let content = note.content;
                
                // 查找所有图片引用
                const imageMatches = content.match(/\[image:(.+?)\]/g) || [];
                for (const match of imageMatches) {
                    const imageId = match.match(/\[image:(.+?)\]/)[1];
                    try {
                        const image = await imageStore.get(imageId);
                        if (image) {
                            content = content.replace(match, image.data);
                        }
                        // 如果没有找到图片，保持原文不变
                    } catch (imageError) {
                        console.error(`加载图片 ${imageId} 失败:`, imageError);
                        // 加载失败时保持原文不变
                    }
                }
                
                return content;
            } catch (error) {
                console.error('加载图片失败:', error);
                return note.content; // 整体失败时返回原文
            }
        }

                'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300',
                'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300',
                'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300',
                'bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-300',
                'bg-pink-100 text-pink-800 dark:bg-pink-900/30 dark:text-pink-300',
                'bg-orange-100 text-orange-800 dark:bg-orange-900/30 dark:text-orange-300',
                'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300',
                'bg-teal-100 text-teal-800 dark:bg-teal-900/30 dark:text-teal-300'
            ];
            let hash = 0;
            for (let i = 0; i < tag.length; i++) {
                hash = tag.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        function formatText(mark) {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            const range = selection.getRangeAt(0);
            const selectedText = range.toString();

            if (selectedText) {
                const wrapper = document.createElement('span');
                if (mark === '**') {
                    wrapper.style.fontWeight = 'bold';
                } else if (mark === '*') {
                    wrapper.style.fontStyle = 'italic';
                } else if (mark === '__') {
                    wrapper.style.textDecoration = 'underline';
                } else if (mark === '~~') {
                    wrapper.style.textDecoration = 'line-through';
                }
                wrapper.appendChild(document.createTextNode(selectedText));
                range.deleteContents();
                range.insertNode(wrapper);
                range.selectNodeContents(wrapper);
                selection.removeAllRanges();
                selection.addRange(range);
            } else {
                document.execCommand('insertText', false, mark + mark);
            }
        }

        // 替换图片引用为实际图片
        async function replaceImageReferences() {
            try {
                const editor = document.getElementById('noteContent');
                
                // 处理文本中的图片引用
                const textNodes = [];
                function collectTextNodes(node) {
                    if (node.nodeType === Node.TEXT_NODE) {
                        textNodes.push(node);
                    } else {
                        for (const child of node.childNodes) {
                            collectTextNodes(child);
                        }
                    }
                }
                collectTextNodes(editor);
                
                for (const textNode of textNodes) {
                    const content = textNode.textContent;
                    const imageMatch = content.match(/\[image:(.+?)\]/);
                    if (imageMatch) {
                        const imageId = imageMatch[1];
                        try {
                            // 从IndexedDB获取图片
                            const db = await initIndexedDB();
                            const transaction = db.transaction('images', 'readonly');
                            const imageStore = transaction.objectStore('images');
                            const image = await imageStore.get(imageId);
                            
                            if (image) {
                                // 创建img元素
                                const img = document.createElement('img');
                                img.src = image.data;
                                img.className = 'max-w-full rounded-lg my-2';
                                img.style.maxHeight = '300px';
                                img.dataset.imageId = imageId;
                                
                                // 分割文本节点
                                const beforeText = content.substring(0, imageMatch.index);
                                const afterText = content.substring(imageMatch.index + imageMatch[0].length);
                                
                                if (beforeText) {
                                    textNode.textContent = beforeText;
                                } else {
                                    textNode.parentNode.removeChild(textNode);
                                }
                                
                                textNode.parentNode.insertBefore(img, textNode.nextSibling);
                                
                                if (afterText) {
                                    const afterNode = document.createTextNode(afterText);
                                    textNode.parentNode.insertBefore(afterNode, img.nextSibling);
                                }
                            }
                            // 如果没有找到图片，保持原文不变
                        } catch (imageError) {
                            console.error('加载图片失败:', imageError);
                            // 加载失败时保持原文不变，显示[image:xxx]标记
                        }
                    }
                }
            } catch (error) {
                console.error('替换图片引用失败:', error);
                // 整体失败时不做任何处理，保持原文不变
            }
        }

        // 存储Base64图片到IndexedDB
        async function storeBase64Image(imageData, noteId) {
            try {
                const db = await initIndexedDB();
                const transaction = db.transaction('images', 'readwrite');
                const imageStore = transaction.objectStore('images');
                
                // 生成唯一ID
                const imageId = Date.now().toString() + Math.random().toString(36).substr(2, 9);
                
                // 存储图片
                await imageStore.add({
                    id: imageId,
                    noteId: noteId,
                    data: imageData,
                    timestamp: new Date().toISOString()
                });
                
                return imageId;
            } catch (error) {
                console.error('存储图片失败:', error);
                return null;
            }
        }

        // 获取编辑器HTML内容
        async function getEditorHTML() {
            const editor = document.getElementById('noteContent');
            const clone = editor.cloneNode(true);
            
            // 将图片元素转换为引用ID
            const images = clone.querySelectorAll('img');
            for (const img of images) {
                if (img.dataset.imageId) {
                    // 替换为引用标记
                    const span = document.createElement('span');
                    span.className = 'image-reference';
                    span.dataset.imageId = img.dataset.imageId;
                    span.textContent = `[image:${img.dataset.imageId}]`;
                    img.parentNode.replaceChild(span, img);
                } else if (img.src.startsWith('data:image')) {
                    // 处理未存储的Base64图片
                    const imageId = await storeBase64Image(img.src, editingId);
                    if (imageId) {
                        // 替换为引用标记
                        const span = document.createElement('span');
                        span.className = 'image-reference';
                        span.dataset.imageId = imageId;
                        span.textContent = `[image:${imageId}]`;
                        img.parentNode.replaceChild(span, img);
                    }
                }
            }
            
            return clone.innerHTML;
        }

        // 在光标位置插入图片
        async function insertImage(imageData) {
            const editor = document.getElementById('noteContent');
            
            try {
                // 存储图片到IndexedDB
                const db = await initIndexedDB();
                const transaction = db.transaction('images', 'readwrite');
                const imageStore = transaction.objectStore('images');
                
                // 生成唯一ID
                const imageId = Date.now().toString() + Math.random().toString(36).substr(2, 9);
                
                // 存储图片
                await imageStore.add({
                    id: imageId,
                    data: imageData,
                    timestamp: new Date().toISOString()
                });
                
                // 创建img元素，使用引用ID
                const img = document.createElement('img');
                img.src = imageData; // 临时使用Base64显示
                img.className = 'max-w-full rounded-lg my-2';
                img.style.maxHeight = '300px';
                img.dataset.imageId = imageId; // 存储引用ID
                
                // 如果是contenteditable，插入图片元素
                if (document.activeElement === editor || editor.contains(document.activeElement)) {
                    const selection = window.getSelection();
                    if (selection.rangeCount > 0) {
                        const range = selection.getRangeAt(0);
                        range.deleteContents();
                        range.insertNode(img);
                        range.collapse(false);
                    } else {
                        editor.appendChild(img);
                    }
                } else {
                    editor.appendChild(img);
                }
                
                // 在图片后添加换行
                const br = document.createElement('br');
                if (editor.lastChild === img) {
                    editor.appendChild(br);
                }
                
                // 触发input事件
                const event = new Event('input', { bubbles: true });
                editor.dispatchEvent(event);
                editor.focus();
            } catch (error) {
                console.error('插入图片失败:', error);
                // 失败时回退到直接插入Base64
                const img = document.createElement('img');
                img.src = imageData;
                img.className = 'max-w-full rounded-lg my-2';
                img.style.maxHeight = '300px';
                editor.appendChild(img);
            }
        }

        // 自动识别链接并转换为可点击链接
        function autoLinkify() {
            const editor = document.getElementById('noteContent');
            if (!editor) return;

            // 保存当前光标位置
            let selection = window.getSelection();
            let range = null;
            if (selection.rangeCount > 0) {
                range = selection.getRangeAt(0);
            }

            // 处理文本节点
            function processNode(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    const text = node.textContent;
                    if (!text) return;

                    // 匹配URL（支持http和https）
                    const urlRegex = /(https?:\/\/[^\s]+)/g;
                    let match;
                    let lastIndex = 0;
                    const parent = node.parentNode;

                    while ((match = urlRegex.exec(text)) !== null) {
                        const url = match[0];
                        const startIndex = match.index;
                        const endIndex = startIndex + url.length;

                        // 创建文本节点（匹配前的文本）
                        if (startIndex > lastIndex) {
                            const textNode = document.createTextNode(text.substring(lastIndex, startIndex));
                            parent.insertBefore(textNode, node);
                        }

                        // 创建链接元素
                        const link = document.createElement('a');
                        link.href = url;
                        link.target = '_blank';
                        link.rel = 'noopener noreferrer';
                        link.className = 'text-blue-600 hover:underline';
                        link.textContent = url;
                        parent.insertBefore(link, node);

                        lastIndex = endIndex;
                    }

                    // 处理剩余文本
                    if (lastIndex < text.length) {
                        const textNode = document.createTextNode(text.substring(lastIndex));
                        parent.insertBefore(textNode, node);
                    }

                    // 删除原节点
                    parent.removeChild(node);
                } else if (node.nodeType === Node.ELEMENT_NODE && node.tagName !== 'A') {
                    // 递归处理子节点
                    const childNodes = Array.from(node.childNodes);
                    for (const child of childNodes) {
                        processNode(child);
                    }
                }
            }

            // 处理编辑器内容
            const childNodes = Array.from(editor.childNodes);
            for (const child of childNodes) {
                processNode(child);
            }

            // 恢复光标位置
            if (range) {
                selection.removeAllRanges();
                selection.addRange(range);
            }
        }

        // 只插入链接
        function insertLinkOnly(url) {
            const editor = document.getElementById('noteContent');

        // 生成简单摘要
        function generateSummary(url) {
            try {
                const urlObj = new URL(url);
                const hostname = urlObj.hostname.replace('www.', '');
                const pathname = urlObj.pathname !== '/' ? urlObj.pathname : '';
                
                // 基于URL生成摘要
                let summary = `来自 ${hostname} 的链接`;
                
                if (pathname) {
                    // 提取路径中的关键词
                    const pathParts = pathname.split('/').filter(part => part.length > 0);
                    if (pathParts.length > 0) {
                        summary += `，内容关于 ${pathParts.slice(0, 2).join('、')}`;
                    }
                }
                
                summary += '。点击查看详细内容。';
                return summary;
            } catch (e) {
                return '网页链接。点击查看详细内容。';
            }
        }

        function handleImageUpload(event) {

            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const imageData = e.target.result;
                insertImage(imageData);
            };
            reader.readAsDataURL(file);
            
            // 清空input以便重复选择同一图片

        }

        // 拖拽粘贴图片支持
        document.getElementById('noteContent').addEventListener('paste', function(event) {
            const items = event.clipboardData.items;
            
            // 检查是否有图片
            let hasImage = false;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.startsWith('image/')) {
                    event.preventDefault();
                    const file = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        insertImage(e.target.result);
                    };
                    reader.readAsDataURL(file);
                    hasImage = true;
                    break;
                }
            }
            
            // 如果没有图片，检查是否是URL
            if (!hasImage) {
                const text = event.clipboardData.getData('text');
                const urlRegex = /^https?:\/\/.+/;
                if (urlRegex.test(text)) {
                    event.preventDefault();
                    showPasteOptions(text);
                }
            }
        });

            }

            notes.sort((a, b) => {

                return new Date(b.timestamp) - new Date(a.timestamp);
            });

        function renderNotes(searchTerm = '') {
            const container = document.getElementById('notesContainer');
            const emptyState = document.getElementById('emptyState');

            let filtered = notes.filter(note => {
                let matchSearch = true;
                let matchTime = true;
                let matchFolderSearch = true;
                
                // 处理搜索语法
                if (searchTerm) {
                    const terms = searchTerm.toLowerCase().split(' ');
                    const regularTerms = [];
                    
                    for (const term of terms) {
                        // 处理时间搜索: before:2025-01-01
                        if (term.startsWith('before:')) {
                            const dateStr = term.substring(7);
                            const targetDate = new Date(dateStr);
                            if (!isNaN(targetDate)) {
                                const noteDate = new Date(note.timestamp);
                                matchTime = noteDate < targetDate;
                            }
                        }
                        // 处理文件夹搜索: in:日记
                        else if (term.startsWith('in:')) {
                            const folderName = term.substring(3);
                            matchFolderSearch = note.folder === folderName;
                        }
                        // 常规搜索词
                        else if (term) {
                            regularTerms.push(term);
                        }
                    }
                    
                    // 处理常规搜索词
                    if (regularTerms.length > 0) {
                        const term = regularTerms.join(' ').replaceAll('#', '');
                        matchSearch = note.title.toLowerCase().includes(term) ||
                            note.content.toLowerCase().includes(term);
                    }
                }

                const matchTags = selectedTags.size === 0 ||
                    Array.from(selectedTags).every(tag =>
                        note.title.includes(`#${tag}`) || note.content.includes(`#${tag}`)
                    );

                const matchFolder = note.folder === currentFolder;

                return matchSearch && matchTags && matchFolder && matchTime && matchFolderSearch;
            });

            // 获取排序选项
            const sortOption = document.getElementById('sortOption').value;
            
            // 对过滤后的笔记进行排序
            filtered.sort((a, b) => {
                // 置顶的笔记始终在前面
                if (a.pinned && !b.pinned) return -1;
                if (!a.pinned && b.pinned) return 1;
                
                // 根据排序选项排序
                if (sortOption === 'relevance' && searchTerm) {
                    // 相关性排序：根据搜索词在标题和内容中的匹配程度
                    const term = searchTerm.toLowerCase().replace('#', '');
                    const aTitleMatch = a.title.toLowerCase().includes(term) ? 1 : 0;
                    const aContentMatch = a.content.toLowerCase().includes(term) ? 1 : 0;
                    const bTitleMatch = b.title.toLowerCase().includes(term) ? 1 : 0;
                    const bContentMatch = b.content.toLowerCase().includes(term) ? 1 : 0;
                    
                    // 标题匹配权重更高
                    const aScore = aTitleMatch * 2 + aContentMatch;
                    const bScore = bTitleMatch * 2 + bContentMatch;
                    
                    if (aScore !== bScore) {
                        return bScore - aScore;
                    }
                }
                
                // 默认按时间倒序
                return new Date(b.timestamp) - new Date(a.timestamp);
            });

            if (filtered.length === 0 && notes.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 opacity-50">没有找到匹配的笔记</div>`;
                emptyState.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.innerHTML = filtered.map(note => {
                const tagRegex = /#(\w+)/g;
                const tags = [];
                let match;
                while ((match = tagRegex.exec(note.title + ' ' + stripHtml(note.content))) !== null) {
                    if (!tags.includes(match[1])) tags.push(match[1]);
                }

                const plainContent = stripHtml(note.content);
                const preview = plainContent.length > 80 ? plainContent.substring(0, 80) + '...' : plainContent;

                return `
                    <div class="note-card glass rounded-2xl p-5 cursor-pointer transition-all duration-200 shadow-sm hover:shadow-lg hover:scale-[1.02] relative group ${String(editingId) === String(note.id) ? 'bg-indigo-50 dark:bg-indigo-900/20' : ''}" data-note-id="${note.id}">
                        ${String(editingId) === String(note.id) ? '<div class="absolute left-0 top-0 bottom-0 w-4 bg-gradient-to-b from-indigo-500 to-purple-600 z-10 rounded-l-2xl"></div>' : ''}
                        ${note.pinned ? '<div class="absolute top-3 right-3 bg-blue-500 text-white text-xs font-bold px-2 py-1 rounded-full z-10 shadow-md pointer-events-none">置顶</div>' : ''}
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="font-bold text-xl line-clamp-2 flex-1">${escapeHtml(note.title)}</h3>
                            <div class="flex gap-1 ${String(editingId) === String(note.id) ? 'opacity-100' : 'opacity-0 group-hover:opacity-100 md:opacity-50'} transition-opacity">
                                <button class="p-1.5 hover:bg-blue-50 rounded-lg transition-colors" data-action="pin" data-note-id="${note.id}" title="${note.pinned ? '取消置顶' : '置顶'}">
                                    <svg class="w-4 h-4 ${note.pinned ? 'text-blue-600 fill-blue-600' : 'text-blue-500'}" fill="${note.pinned ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path>
                                    </svg>
                                </button>
                                <button class="p-1.5 hover:bg-green-50 rounded-lg transition-colors" data-action="move" data-note-id="${note.id}" title="移动到文件夹">
                                    <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                                    </svg>
                                </button>
                                <button class="p-1.5 hover:bg-red-50 rounded-lg transition-colors" data-action="delete" data-note-id="${note.id}" title="删除">
                                    <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <p class="text-sm opacity-70 mb-3 line-clamp-3">${escapeHtml(preview)}</p>
                        ${tags.length > 0 ? `<div class="flex flex-wrap gap-1 mb-3">${tags.slice(0, 3).map(t => {
                            const colorClass = getTagColor(t);
                            return `<span class="tag text-xs ${colorClass} px-2 py-1 rounded-full">#${t}</span>`;
                        }).join('')}</div>` : ''}
                        <div class="flex justify-between items-center pt-3 border-t border-gray-200/50">
                            <span class="timestamp text-xs opacity-50">${formatTime(note.timestamp)}</span>
                            <span class="text-xs opacity-50">${stripHtml(note.content).length} 字</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 删除笔记时同步清理 IndexedDB 图片
        async function deleteNoteImages(noteId) {
            try {
                const db = await initIndexedDB();
                const transaction = db.transaction('images', 'readwrite');
                const imageStore = transaction.objectStore('images');
                const index = imageStore.index('noteId');
                
                return new Promise((resolve, reject) => {
                    const request = index.getAll(noteId);
                    request.onsuccess = async () => {
                        const images = request.result;
                        for (const image of images) {
                            await new Promise((res, rej) => {
                                const deleteReq = imageStore.delete(image.id);
                                deleteReq.onsuccess = res;
                                deleteReq.onerror = rej;
                            });
                        }
                        resolve();
                    };
                    request.onerror = reject;
                });
            } catch (error) {
                console.error('删除笔记图片失败:', error);
            }
        }

        async function deleteNote(id) {

            id = String(id);

            if (!noteToDelete) {
                alert('找不到要删除的笔记，id: ' + id);

            if (!confirm('确定要删除这条笔记吗？')) return;

            notes = notes.filter(n => String(n.id) !== id);
            await saveNotes();
            updateStats();
            renderNotes();

        async function pinNote(id) {

        function exportNotes() {
            if (notes.length === 0) {
                alert('没有笔记可导出');
                return;
            }
            
            // 提供格式选择
            const format = prompt('请选择导出格式：\n1. Markdown (md)\n2. 文本 (txt)\n3. JSON (json)\n4. 完整备份(含加密密钥)', '1');
            
            let content, mimeType, extension;
            
            switch (format) {
                case '1':
                    // Markdown 格式
                    content = notes.map(note => {
                        const date = new Date(note.timestamp).toLocaleString();
                        return `# ${note.title}\n\n${note.content}\n\n---\n创建时间：${date}\n`;
                    }).join('\n');
                    mimeType = 'text/markdown';
                    extension = 'md';
                    break;
                case '2':
                    // 文本格式
                    content = notes.map(note => {
                        const date = new Date(note.timestamp).toLocaleString();
                        return `标题：${note.title}\n内容：${note.content}\n创建时间：${date}\n${'-'.repeat(50)}\n`;
                    }).join('\n');
                    mimeType = 'text/plain';
                    extension = 'txt';
                    break;
                case '4':
                    // 完整备份（包含加密密钥、文件夹等）
                    const backupData = {
                        version: 2,
                        exportTime: new Date().toISOString(),
                        encryptionKey: localStorage.getItem('encryptionKey'),
                        folders: JSON.parse(localStorage.getItem('folders') || '[]'),
                        notes: notes
                    };
                    content = JSON.stringify(backupData, null, 2);
                    mimeType = 'application/json';
                    extension = 'json';
                    break;
                case '3':
                default:
                    // JSON 格式（仅笔记）
                    content = JSON.stringify(notes, null, 2);
                    mimeType = 'application/json';
                    extension = 'json';
                    break;
            }
            
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `notes_${new Date().toISOString().split('T')[0]}.${extension}`;
            link.click();
            URL.revokeObjectURL(url);
        }
