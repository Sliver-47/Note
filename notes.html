        }

        // 计算内容hash
        async function calculateContentHash(content) {
            const encoder = new TextEncoder();
            const data = encoder.encode(content);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 检查笔记是否重复
        async function checkNoteDuplicate(title, content) {
            const contentHash = await calculateContentHash(content);
            
            for (const note of notes) {
                const noteHash = await calculateContentHash(note.content);
                if (noteHash === contentHash) {
                    return note;
                }
            }
            return null;
        }

        // 导入笔记
        document.getElementById('importInput').addEventListener('change', async function(event) {
            const files = event.target.files;
            if (!files.length) return;

            for (const file of Array.from(files)) {
                const content = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.onerror = reject;
                    reader.readAsText(file);
                });
                
                const fileName = file.name;
                const fileExtension = fileName.split('.').pop().toLowerCase();

                // 检查是否是完整备份文件
                if (fileExtension === 'json') {
                    try {
                        const backupData = JSON.parse(content);
                        if (backupData.version === 2 && backupData.encryptionKey) {
                            // 完整备份格式
                            const importChoice = prompt(`检测到完整备份文件！\n\n导入将包含：\n- ${backupData.notes.length} 条笔记\n- ${(backupData.folders || []).length} 个文件夹\n- 加密密钥\n\n⚠️ 导入加密密钥将覆盖当前密钥，当前加密数据将无法解密！\n\n请选择：\n1. 完整导入（替换所有数据）\n2. 仅导入笔记\n3. 取消`, '2');
                            
                            if (importChoice === '1') {
                                // 完整导入
                                if (confirm('确定要完整导入吗？这将覆盖所有当前数据！')) {
                                    localStorage.setItem('encryptionKey', backupData.encryptionKey);
                                    if (backupData.folders) {
                                        localStorage.setItem('folders', JSON.stringify(backupData.folders));
                                        folders = backupData.folders;
                                    }
                                    notes = backupData.notes.map(note => ({
                                        id: String(note.id || Date.now().toString()),
                                        title: note.title || '无标题',
                                        content: note.content || '',
                                        timestamp: note.timestamp || new Date().toISOString(),
                                        pinned: note.pinned || false,
                                        starred: note.starred || false,
                                        folder: note.folder || 'default',
                                        tags: note.tags || []
                                    }));
                                    await saveNotes();
                                    updateStats();
                                    renderNotes();
                                    renderFolders();
                                    alert('完整导入成功！');
                                }
                                continue;
                            } else if (importChoice === '2') {
                                // 仅导入笔记
                                notes = backupData.notes.map(note => ({
                                    id: String(note.id || Date.now().toString()),
                                    title: note.title || '无标题',
                                    content: note.content || '',
                                    timestamp: note.timestamp || new Date().toISOString(),
                                    pinned: note.pinned || false,
                                    starred: note.starred || false,
                                    folder: note.folder || 'default',
                                    tags: note.tags || []
                                }));
                                await saveNotes();
                                updateStats();
                                renderNotes();
                                alert('仅笔记导入成功！');
                                continue;
                            } else {
                                continue;
                            }
                        }
                    } catch (e) {
                        console.error('解析备份文件失败:', e);
                    }
                }

                let title, noteContent;

                switch (fileExtension) {
                    case 'md':
                        title = fileName.replace('.md', '');
                        noteContent = content;
                        break;
                    case 'txt':
                        title = fileName.replace('.txt', '');
                        noteContent = content.replace(/\n/g, '<br>');
                        break;
                    case 'html':
                        title = fileName.replace('.html', '');
                        noteContent = content;
                        break;
                    default:
                        title = fileName;
                        noteContent = content;
                }

                // 检查是否重复
                const duplicateNote = await checkNoteDuplicate(title, noteContent);
                let choice = null;
                
                if (duplicateNote) {
                    choice = prompt(`发现重复笔记："${duplicateNote.title}"\n\n请选择操作：\n1. 跳过\n2. 覆盖\n3. 重命名\n\n请输入数字 1-3`, '1');
                    
                    switch (choice) {
                        case '1':
                            continue;
                        case '2':
                            duplicateNote.title = title;
                            duplicateNote.content = noteContent;
                            duplicateNote.timestamp = new Date().toISOString();
                            break;
                        case '3':
                            const newTitle = prompt('请输入新标题：', title);
                            if (!newTitle) continue;
                            title = newTitle;
                            break;
                        default:
                            continue;
                    }
                }

                // 让用户选择目标文件夹
                const folderNames = folders.map(f => f.name);
                const folderChoice = prompt(`请选择导入到哪个文件夹：\n${folderNames.map((name, index) => `${index + 1}. ${name}`).join('\n')}\n\n请输入数字 1-${folderNames.length}`, '1');
                const folderIndex = parseInt(folderChoice) - 1;
                const targetFolder = folderIndex >= 0 && folderIndex < folders.length ? folders[folderIndex].id : 'default';
                
                // 创建新笔记（如果不是覆盖）
                if (!duplicateNote || choice === '3') {
                    const newNote = {
                        id: Date.now().toString(),
                        title: title,
                        content: noteContent,
                        timestamp: new Date().toISOString(),
                        folder: targetFolder,
                        tags: [],
                        pinned: false
                    };
                    notes.unshift(newNote);
                }

                await saveNotes();
                renderNotes();
            }

            // 清空文件输入
            event.target.value = '';
        });

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)} 天前`;

            return date.toLocaleDateString('zh-CN');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sanitizeHtml(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            const scripts = div.querySelectorAll('script, iframe, object, embed');
            scripts.forEach(el => el.remove());
            div.querySelectorAll('*').forEach(el => {
                for (const attr of [...el.attributes]) {
                    if (attr.name.startsWith('on')) el.removeAttribute(attr.name);
                }
            });
            return div.innerHTML;
        }

        // 背景设置相关函数
        function toggleBackgroundSettings() {
            const panel = document.getElementById('backgroundSettings');
            panel.classList.toggle('hidden');
        }

        function setBackground(background) {
            localStorage.setItem('background', background);
            applyBackground();
        }

        function uploadBackground() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const imageUrl = event.target.result;
                        localStorage.setItem('background', imageUrl);
                        applyBackground();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function applyBackground() {
            const background = localStorage.getItem('background');
            const body = document.body;
            
            if (background === 'gradient' || !background) {
                body.style.background = 'var(--bg-primary)';
                body.style.backgroundSize = 'cover';
                body.style.backgroundPosition = 'center';
                body.style.backgroundRepeat = 'no-repeat';
            } else {
                body.style.background = `url('${background}')`;
                body.style.backgroundSize = 'cover';
                body.style.backgroundPosition = 'center';
                body.style.backgroundRepeat = 'no-repeat';
            }
        }

        // 修改init函数，添加背景初始化
        async function init() {
            if (isDark) document.body.classList.add('dark');
            // 应用背景
            applyBackground();
            // 加载笔记
            notes = await loadNotes();
            // 初始化本地备份
            await initLocalBackup();
            updateStats();
            renderFolders();
            renderNotes();
            renderTagFilter();

            // 搜索防抖
            let searchTimer;
            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => {
                    renderNotes(e.target.value);
                }, 300);
            });
            document.getElementById('sortOption').addEventListener('change', () => renderNotes(document.getElementById('searchInput').value));
            document.getElementById('noteTitle').addEventListener('input', detectTags);
            document.getElementById('noteContent').addEventListener('input', (e) => {
                detectTags();
                // 暂时禁用autoLinkify，避免输入重复
                // autoLinkify();
                // 如果预览是打开状态，实时更新预览内容
                if (isPreviewMode) {
                    updatePreview();
                }
            });

            // 添加笔记卡片事件监听器
            const notesContainer = document.getElementById('notesContainer');
            if (notesContainer) {
                notesContainer.addEventListener('click', function(e) {
                    const noteCard = e.target.closest('.note-card');
                    if (noteCard) {
                        const noteId = noteCard.dataset.noteId;
                        if (noteId) {
                            const actionButton = e.target.closest('[data-action]');
                            if (actionButton) {
                                // 阻止事件冒泡，避免触发笔记卡片的点击事件
                                e.stopPropagation();
                                const action = actionButton.dataset.action;
                                const actionNoteId = actionButton.dataset.noteId;
                                switch (action) {
                                    case 'pin':
                                        pinNote(actionNoteId);
                                        break;
                                    case 'move':
                                        moveNoteToFolder(actionNoteId);
                                        break;
                                    case 'delete':
                                        deleteNote(actionNoteId);
                                        break;
                                }
                            } else {
                                triggerHapticFeedback();
                                editNote(noteId);
                                closeMobileSidebar();
                            }
                        }
                    }
                });
                
                // 添加右键菜单事件
                notesContainer.addEventListener('contextmenu', function(e) {
                    const noteCard = e.target.closest('.note-card');
                    if (noteCard) {
                        e.preventDefault();
                        const noteId = noteCard.dataset.noteId;
                        if (noteId) {
                            showContextMenu(e, noteId);
                        }
                    }
                });
            }

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') addNote();
                
                // 拦截Ctrl+Z和Ctrl+Y，统一撤销/重做行为
                if (e.ctrlKey) {
                    if (e.key === 'z' && !e.shiftKey) {
                        e.preventDefault();
                        undo();
                    } else if (e.key === 'y' || (e.key === 'z' && e.shiftKey)) {
                        e.preventDefault();
                        redo();
                    }
                }
            });

            // 启用自动保存
            setupAutoSave();
            // 初始化新建菜单
            initNewNoteMenu();
            // 初始化键盘弹出检测
            initKeyboardDetection();
        }

        // 触觉反馈（振动）
        function triggerHapticFeedback() {
            if (navigator.vibrate) {
                // 短振动（10ms）
                navigator.vibrate(10);
            }
        }

        // 初始化新建菜单
        function initNewNoteMenu() {
            const newNoteBtn = document.getElementById('newNoteBtn');
            const newNoteMenu = document.getElementById('newNoteMenu');
            
            if (newNoteBtn && newNoteMenu) {
                newNoteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    newNoteMenu.classList.toggle('hidden');
                });
                
                // 点击其他地方关闭菜单
                document.addEventListener('click', (e) => {
                    if (!newNoteBtn.contains(e.target) && !newNoteMenu.contains(e.target)) {
                        newNoteMenu.classList.add('hidden');
                    }
                });
            }
        }

        // 新建空白文档
        async function newBlankNote() {
            await clearForm();
            document.getElementById('noteTitle').focus();
            document.getElementById('newNoteMenu').classList.add('hidden');
        }

        // 键盘弹出检测和自动滚动
        function initKeyboardDetection() {
            // 检测视口变化
            let viewportHeight = window.innerHeight;
            
            window.addEventListener('resize', () => {
                const newHeight = window.innerHeight;
                const heightDiff = viewportHeight - newHeight;
                
                // 检测键盘弹出（高度减少超过100px）
                if (heightDiff > 100) {
                    // 键盘弹出，滚动到输入焦点
                    const activeElement = document.activeElement;
                    if (activeElement && (activeElement.tagName === 'INPUT' || activeElement.tagName === 'DIV')) {
                        activeElement.scrollIntoView({ 
                            behavior: 'smooth',
                            block: 'center'
                        });
                    }
                }
                
                viewportHeight = newHeight;
            });
            
            // 输入框获得焦点时自动滚动
            const noteTitle = document.getElementById('noteTitle');
            const noteContent = document.getElementById('noteContent');
            
            if (noteTitle) {
                noteTitle.addEventListener('focus', function() {
                    this.scrollIntoView({ 
                        behavior: 'smooth',
                        block: 'center'
                    });
                });
            }
            
            if (noteContent) {
                noteContent.addEventListener('focus', function() {
                    this.scrollIntoView({ 
                        behavior: 'smooth',
                        block: 'center'
                    });
                });
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
        
        <!-- Service Worker 注册 -->
        <script>
            if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
                window.addEventListener('load', () => {
                    const swPath = './service-worker.js';
                    navigator.serviceWorker.register(swPath)
                        .then((registration) => {
                            console.log('Service Worker 注册成功:', registration.scope);
                        })
                        .catch((error) => {
                            console.log('Service Worker 注册失败:', error);
                        });
                });
            } else if (window.location.protocol === 'file:') {
                console.log('在 file:// 协议下不注册 Service Worker');
            }
        </script>
